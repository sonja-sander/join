@if (router.url !== '/'){
  <div class="app-layout" [class.white-bg]="router.url === '/add-task'">
    <app-cockpit />
    <app-header />
    <div class="content-area" [class.no-max-height]="router.url === '/imprint' || router.url === '/privacy' || router.url === '/help'">
      <router-outlet />
    </div>
    <div class="empty-content-column"></div>
    <div class="empty-content-row"></div>
  </div>
} @else {
  <div class="app-layout-login">
    <div class="content-area">
      <router-outlet />
    </div>
    <div class="empty-content-column-left"></div>
    <div class="empty-content-column-right"></div>
    <div class="empty-content-row"></div>
  </div>
}
