@if (router.url !== '/') {
  <div class="app-layout" [class.white-bg]="router.url === '/add-task'">
    <app-cockpit />
    <app-header />
    <main class="content-area" id="main-content" tabindex="-1">
      <router-outlet />
    </main>
    <div class="empty-content-column"></div>
    <div class="empty-content-row"></div>
  </div>
} @else {
  <div class="app-layout-login">
    <div class="content-area">
      <router-outlet />
    </div>
  </div>
}
