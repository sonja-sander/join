<section aria-labelledby="board-title">
  <div class="content-wrapper">
    <div class="title-section">
      <h1 id="board-title">Board</h1>
      <div class="search-bar" role="search">
        <label for="search-input" class="sr-only"
          >Search tasks by category, title or description</label
        >
        <input
          id="search-input"
          class="search-bar__input"
          [(ngModel)]="searchTerm"
          (input)="search()"
          type="text"
          placeholder="Find Task"
        />
        <div class="search-bar__divider" aria-hidden="true"></div>
        <button type="button" class="search-bar__button" (click)="search()" aria-label="Search">
          <app-icon name="search" aria-hidden="true" />
        </button>
      </div>
      <button
        type="button"
        class="add-task-btn button button--primary button--icon"
        (click)="openAddTaskOverlay()"
        aria-label="Add task"
      >
        <span class="desktop-only">Add task</span>
        <app-icon name="add-new-task" [size]="20" aria-hidden="true" />
      </button>
    </div>

    <div class="board">
      <app-task-list
        status="to-do"
        listTitle="To do"
        (openTask)="openTask($event)"
        (addTaskRequested)="openAddTaskOverlay($event)"
      ></app-task-list>
      <app-task-list
        status="in-progress"
        listTitle="In progress"
        (openTask)="openTask($event)"
        (addTaskRequested)="openAddTaskOverlay($event)"
      ></app-task-list>
      <app-task-list
        status="await-feedback"
        listTitle="Await feedback"
        (openTask)="openTask($event)"
        (addTaskRequested)="openAddTaskOverlay($event)"
      ></app-task-list>
      <app-task-list
        status="done"
        listTitle="Done"
        (openTask)="openTask($event)"
        (addTaskRequested)="openAddTaskOverlay($event)"
      ></app-task-list>
      <p class="sr-only" role="status" aria-live="polite">
        @if (taskService.searchTerm()) {
          {{ searchResult() }}
        }
      </p>
    </div>

    @if (selectedTask()) {
      <app-task-dialog
        [task]="selectedTask()!"
        (close)="selectedTask.set(null)"
        (deleteTask)="deleteTask($event)"
        (editTask)="openEditTaskOverlay($event)"
      ></app-task-dialog>
    }

    @if (isAddTaskOverlayOpen()) {
      <div
        class="add-task-overlay"
        role="dialog"
        aria-modal="true"
        [attr.aria-label]="taskToEdit() ? 'Edit task' : 'Add new task'"
        (mousedown)="onAddTaskOverlayMouseDown($event)"
      >
        <div class="add-task-overlay__panel" cdkTrapFocus cdkTrapFocusAutoCapture>
          <button
            type="button"
            class="add-task-overlay__close"
            aria-label="Close add task overlay"
            (click)="onCloseAddTaskClick()"
          >
            <app-icon name="close" aria-hidden="true" />
          </button>

          <app-add-task
            [isOverlay]="true"
            [taskToEdit]="taskToEdit()"
            [initialStatus]="addTaskStatus()"
            (closeDialogRequested)="closeAddTaskOverlay()"
            (viewerStateChange)="viewerOpen.set($event)"
            (dirtyChange)="onAddTaskDirtyChange($event)"
          ></app-add-task>
        </div>
      </div>
    }
  </div>
</section>

<app-confirm-dialog
  [open]="showCloseConfirm()"
  [highlight]="'Close'"
  [highlightObject]="taskToEdit()?.title ?? 'this task'"
  [message]="'Your changes will be lost.'"
  [confirmText]="'Close'"
  [cancelText]="'Cancel'"
  (confirm)="confirmClose()"
  (cancel)="cancelClose()"
></app-confirm-dialog>
