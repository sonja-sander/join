<section class="add-task" [class.add-task--overlay]="isOverlay()">
  <header class="add-task__header">
    <h1 id="add-task-title">{{ isEditMode ? 'Edit Task' : 'Add Task' }}</h1>
  </header>

  <form
    class="add-task__form"
    autocomplete="on"
    (ngSubmit)="createTask()"
    (focusin)="markAsEdited()"
    aria-labelledby="add-task-title"
  >
    <div class="add-task__content">
      <div class="add-task__column">

        <app-task-form-field
          label="Title"
          [isRequired]="true"
          placeholder="Enter a title"
          (fieldBlur)="isTitleTouched = true"
          [hasError]="isTitleTouched && !taskData.title.trim()"
          [(value)]="taskData.title"
        ></app-task-form-field>

        <span
          class="add-task__field-error"
          [class.is-visible]="isTitleTouched && !taskData.title.trim()"
        >
          This field is required
        </span>

        <app-task-form-field
          label="Description"
          [isTextarea]="true"
          placeholder="Enter a Description"
          [(value)]="taskData.description"
        ></app-task-form-field>

        <app-task-form-field
          class="add-task__padding-top"
          label="Due date"
          [isRequired]="true"
          placeholder="yyyy/mm/dd"
          type="text"
          [useFlatpickr]="true"
          [min]="minDueDate"
          (fieldBlur)="isDueDateTouched = true"
          [hasError]="isDueDateTouched && !taskData.dueDate.trim()"
          [(value)]="taskData.dueDate"
          iconSrc="date"
        ></app-task-form-field>

        <span
          class="add-task__field-error"
          [class.is-visible]="isDueDateTouched && !taskData.dueDate.trim()"
        >
          This field is required
        </span>
      </div>

      <div class="add-task__column add-task__column--divider">
        <app-priority-selector
          [(selectedPriority)]="taskData.priority"
        ></app-priority-selector>

        <app-dropdown-assignee
          class="add-task__padding-top"
          [(selectedContacts)]="taskData.assignees"
        ></app-dropdown-assignee>

        <app-dropdown-category
          class="add-task__padding-top"
          [selectedCategory]="taskData.category"
          (selectedCategoryChange)="taskData.category = $event"
          (fieldBlur)="isCategoryTouched = true"
          [hasError]="isCategoryTouched && !taskData.category"
        ></app-dropdown-category>

        <span
          class="add-task__field-error"
          [class.is-visible]="isCategoryTouched && !taskData.category"
        >
          This field is required
        </span>

        <app-attachments
          [attachments]="taskData.attachments"
          (attachmentsChange)="taskData.attachments = $event; markAsEdited()"
          (viewerStateChange)="viewerStateChange.emit($event)"
          (imageTypeError)="showErrorToast('imageTypeError')"
          (taskSizeError)="showErrorToast('taskSizeError')"
          (deleteAll)="showDeleteAllConfirm = true"
        ></app-attachments>

        <app-subtask-composer
          [(subtasks)]="taskData.subtasks"
        ></app-subtask-composer>

      </div>
    </div>

    <footer class="add-task__footer">
      <span class="add-task__required-note">
        <span class="required">*</span> This field is required
      </span>

      <div class="add-task__actions">
        @if (!isEditMode) {
          <button
            type="button"
            class="button button--secondary button--icon"
            (click)="resetForm()"
          >
            Clear
            <app-icon class="button__icon" name="close" [size]="22" aria-hidden="true"/>
          </button>
        }

        <button
          type="submit"
          class="button button--primary button--icon"
          [class.add-task__submit-button--disabled]="!isFormValid || isSubmitting"
          [attr.aria-disabled]="!isFormValid ? 'true' : null"
        >
          {{
            isSubmitting
              ? (isEditMode ? 'Saving...' : 'Creating...')
              : (isEditMode ? 'Save' : 'Create Task')
          }}
          <app-icon class="button__icon" name="check" aria-hidden="true" />
        </button>

      </div>
    </footer>
  </form>
</section>

<app-toast
  [message]="'File format not allowed! You can only upload JPEG or PNG.'"
  type="error"
  [visible]="imageTypeError"
  (close)="imageTypeError = false"
></app-toast>

<app-toast
  [message]="'Attached files are too large in total. Max allowed is 1 MB.'"
  type="error"
  [visible]="taskSizeError"
  (close)="taskSizeError = false"
></app-toast>

<app-toast
  [message]="isEditMode ? 'Task updated' : 'Task created'"
  type="info"
  [visible]="addTaskSuccess"
></app-toast>

<app-confirm-dialog
  [open]="showDeleteAllConfirm"
  [highlight]="'Delete all attachments of'"
  [highlightObject]="taskData.title"
  confirmText="Delete"
  cancelText="Cancel"
  (confirm)="confirmDeleteAllAttachments()"
  (cancel)="showDeleteAllConfirm = false"
></app-confirm-dialog>
