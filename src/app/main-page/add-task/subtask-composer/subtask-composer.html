<label class="form-field">
  <span class="form-field__label">Subtasks</span>
  <div
    class="form-field__control"
    [class.form-field__control--error]="showSubtaskPatternError || showSubtaskDuplicateError()"
  >
    <input
      class="form-field__input"
      type="text"
      placeholder="Add new subtask"
      [value]="subtaskData.title"
      #input
      (input)="onSubtaskTitleInput(input.value)"
      (keydown.enter)="handleEnter($event)"
    />

    @if (hasSubtaskInput) {
      <div class="subtask-actions">
        <button
          type="button"
          class="icon-button"
          aria-label="Clear subtask title"
          (click)="clearSubtaskTitle()"
        >
          <app-icon name="close" [size]="21" aria-hidden="true"></app-icon>
        </button>
        <span class="subtask-actions__divider" aria-hidden="true"></span>

        <button type="button" class="icon-button" aria-label="Save subtask" (click)="addSubtask()">
          <app-icon name="check" aria-hidden="true"></app-icon>
        </button>
      </div>
    } @else {
      <button type="button" class="icon-button" aria-label="Add new subtask" (click)="addSubtask()">
        <app-icon name="add" [size]="22" aria-hidden="true"></app-icon>
      </button>
    }
  </div>

  @if (showSubtaskPatternError) {
    <span class="subtask-pattern-error">
      Use up to {{ subtaskTitleMaxLength }} chars with at least {{ subtaskTitleMinLetters }} letters
      (a-z)
    </span>
  }

  @if (showSubtaskDuplicateError()) {
    <span class="subtask-pattern-error"> This subtask already exists! </span>
  }

  @if (subtasks().length) {
    <ul class="subtask-list scroll-shadows">
      @for (subtask of subtasks(); track $index) {
        <li class="subtask-list__item">
          <span class="subtask-list__bullet" aria-hidden="true">•</span>

          <span class="subtask-list__title">
            {{ subtask.title }}
          </span>

          <div class="subtask-list__actions">
            <button
              type="button"
              class="icon-button icon-button--small"
              aria-label="Edit subtask"
              (click)="startEditSubtask($index)"
            >
              <app-icon name="edit" [size]="22" aria-hidden="true"></app-icon>
            </button>

            <span class="subtask-list__divider" aria-hidden="true"></span>

            <button
              type="button"
              class="icon-button icon-button--small"
              aria-label="Delete subtask"
              (click)="removeSubtask($index)"
            >
              <app-icon name="delete" [size]="22" aria-hidden="true"></app-icon>
            </button>
          </div>
        </li>
      }
    </ul>
  }
</label>
