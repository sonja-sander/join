<div class="priority-field">
  <span class="priority-field__label">Priority</span>
  <div class="priority">
    @for (option of options; track option.value) {
      <button
        type="button"
        class="priority__button {{ option.modifierClass }}"
        (click)="selectPriority(option.value)"
        [class.is-active]="option.value === selectedPriority()"
      >
        {{ option.label }}
        <app-icon class="priority__icon" [name]="option.iconPath" aria-hidden="true"></app-icon>
      </button>
    }
  </div>
</div>
