<aside aria-label="Navigation sidebar">
  <div class="content-wrapper">
    <img class="logo" src="assets/img/icons/logo-light.svg" alt="Join logo" />

    @if (authLoading$ | async) {
      <div class="cockpit-loading" role="status" aria-live="polite">
        <div class="loading-spinner"></div>
      </div>
    } @else {
      <nav class="main-nav" aria-label="Primary">
        @if (user$ | async) {
          <ul>
            <li>
              <a routerLink="/summary" routerLinkActive="is-active">
                <app-icon class="nav-icon" name="summary" aria-hidden="true"></app-icon>
                <span>Summary</span>
              </a>
            </li>
            <li>
              <a routerLink="/add-task" routerLinkActive="is-active">
                <app-icon class="nav-icon" name="add-task" aria-hidden="true"></app-icon>
                <span>Add Task</span>
              </a>
            </li>
            <li>
              <a routerLink="/board" routerLinkActive="is-active">
                <app-icon class="nav-icon" name="board" aria-hidden="true"></app-icon>
                <span>Board</span>
              </a>
            </li>
            <li>
              <a routerLink="/contacts" routerLinkActive="is-active">
                <app-icon class="nav-icon" name="contacts" aria-hidden="true"></app-icon>
                <span>Contacts</span>
              </a>
            </li>
          </ul>
        } @else {
          <ul>
            <li>
              <a routerLink="/" class="log-in-link">
                <app-icon class="nav-icon" name="log-in" aria-hidden="true"></app-icon>
                <span>Log In</span>
              </a>
            </li>
          </ul>
        }
      </nav>

      <nav class="legal-nav" [class.desktop-only]="user$ | async" aria-label="Legal">
        <ul>
          <li>
            <a routerLink="/privacy" routerLinkActive="is-active"> Privacy Policy </a>
          </li>
          <li>
            <a routerLink="/imprint" routerLinkActive="is-active"> Legal Notice </a>
          </li>
        </ul>
      </nav>
    }
  </div>
</aside>
