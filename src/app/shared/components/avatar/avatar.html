<span
  class="avatar"
  [class.initials]="!avatar()"
  [style.backgroundColor]="color() ?? '#cccccc'"
  [style.width.px]="size()"
  [style.height.px]="size()"
  [style.--avatar-size.px]="size()"
  [attr.data-initials]="initials"
>
  @if (avatar()) {
    <img
      class="avatar-img"
      [src]="avatar()"
      alt=""
    />
  }
</span>
