<header>
  <div class="content-wrapper">
    <div class="content-left">
      <img class="mobile-logo mobile-only" src="assets/img/icons/logo-dark.svg" alt="Join logo" />
      <h2 class="desktop-title desktop-only">Kanban Project Management Tool</h2>
    </div>
    <div class="content-right">
      @if (user$ | async; as user) {
        <a
          routerLink="/help"
          class="desktop-help-link desktop-only"
          title="Help"
          aria-label="Open help page"
        >
          <app-icon class="help-icon" name="help" aria-hidden="true"></app-icon>
        </a>

        <button
          class="user-menu-button"
          [class.is-open]="menuOpen()"
          (click)="toggleMenu()"
          [attr.aria-label]="menuOpen() ? 'Close user menu' : 'Open user menu'"
          aria-controls="user-menu"
          [attr.aria-expanded]="menuOpen()"
          aria-haspopup="menu"
        >
          @if (user.isAnonymous) {
            <span aria-hidden="true">G</span>
          } @else {
            <span aria-hidden="true">
              {{ getLoggedInUserInitials(user.displayName) }}
            </span>
          }
        </button>

        @if (menuOpen()) {
          <div class="menu-overlay" (click)="closeMenu()" aria-hidden="true"></div>
        }
        <nav
          id="user-menu"
          class="user-menu"
          [class.is-open]="menuOpen()"
          aria-label="User menu"
        >
          <ul>
            <li class="mobile-only">
              <a routerLink="/help" (click)="closeMenu()" [attr.tabindex]="menuOpen() ? 0 : -1">Help</a>
            </li>
            <li>
              <a routerLink="/imprint" (click)="closeMenu()" [attr.tabindex]="menuOpen() ? 0 : -1">Legal Notice</a>
            </li>
            <li>
              <a routerLink="/privacy" (click)="closeMenu()" [attr.tabindex]="menuOpen() ? 0 : -1">Privacy Policy</a>
            </li>
            <li>
              <button type="button" (click)="logout()" [attr.tabindex]="menuOpen() ? 0 : -1">Log out</button>
            </li>
          </ul>
        </nav>
      }
    </div>
  </div>
</header>
