<section>
  <p class="title">Attachments</p>

  <div class="description">
    <p>Allowed file types are JPEG and PNG</p>
    @if (attachments.length > 0) {
      <button type="button" (click)="deleteAllAttachments()">
        <img class="icon icon--default" src="assets/img/icons/buttons/delete.svg" alt="" aria-hidden="true">
        <img class="icon icon--hover" src="assets/img/icons/buttons/delete-hover.svg" alt="" aria-hidden="true">
        Delete all
      </button>
    }
  </div>

  <div class="drag-area" 
    [class.drag-area--active]="isDragging"
    onclick="filePicker.click()" 
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
  >
    <p>Drag file or browse</p>
    <img src="assets/img/icons/add-task/add-attachment.svg" alt="">
  </div>

  <input
    id="filePicker"
    class="filePicker"
    type="file"
    accept="image/png, image/jpeg"
    (change)="onFileSelect($event)"
    multiple
    hidden
  />
    
  <div class="gallery" #gallery>
    @for (attachment of attachments; track attachment.fileName) {
      <figure class="attachment">
        <div class="image-wrapper">
          <img class="attachment-img" [src]="attachment.base64" [alt]="attachment.fileName" (click)="openImageViewer($index)">
          <button
            class="delete-btn"
            type="button"
            (click)="deleteSingleAttachment(attachment)"
            aria-label="Delete {{ attachment.fileName }}"
          >
            <img class="delete-icon" src="assets/img/icons/add-task/delete-white.svg" alt="" aria-hidden="true">
          </button>
        </div>
        <figcaption>{{ attachment.fileName }}</figcaption>
      </figure>
    }
  </div>

</section>

@if (showViewer) {
  <app-image-viewer
    [attachments]="attachments"
    [startIndex]="viewerStartIndex"
    (close)="showViewer = false"
  >
  </app-image-viewer>
}
